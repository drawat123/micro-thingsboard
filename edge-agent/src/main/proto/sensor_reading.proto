syntax = "proto3";

package com.divyam.telemetry.proto;

option java_package = "com.divyam.telemetry.proto";
option java_outer_classname = "SensorReadingOuter";
option java_multiple_files = true;

message SensorReadingProto {
  string sensor_id = 1;
  double value = 2;
  int64 timestamp_millis = 3;
}